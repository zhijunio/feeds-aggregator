name: feeds-aggregator
description: Aggregate feed sources into a unified JSON result.

inputs:
  sources:
    description: Path to the sources input file in the caller workspace
    required: true
  output:
    description: Path to the generated feeds JSON file
    required: false
    default: data/feeds.json
  workers:
    description: Concurrent source workers
    required: false
    default: "8"
  timeout:
    description: Per-source request timeout in seconds
    required: false
    default: "15"
  favicon-delay-ms:
    description: Delay between favicon discovery/download requests in milliseconds
    required: false
    default: "200"
  max-items-per-source:
    description: Max items per source
    required: false
    default: "10"
  max-total-items:
    description: Max total items
    required: false
    default: "0"
  max-days:
    description: Keep only items from recent days
    required: false
    default: "0"
  timezone:
    description: IANA timezone for output timestamps
    required: false
    default: "UTC"
  favicon-dir:
    description: Directory to store downloaded favicon images
    required: false
    default: ""
  favicon-public-prefix:
    description: Root-relative URL prefix for local favicon filenames in JSON (e.g. /images/_favicons); empty keeps basename only
    required: false
    default: ""
  failure-log:
    description: Optional JSON file path for writing failed feed details
    required: false
    default: ""
  validate-only:
    description: Validate inputs and configuration without fetching feeds or writing output
    required: false
    default: "false"

outputs:
  output-path:
    description: Output file path generated by feeds-aggregator
    value: ${{ steps.meta.outputs.output-path }}

runs:
  using: composite
  steps:
    - name: Install feeds-aggregator
      shell: bash
      run: python -m pip install "${{ github.action_path }}"

    - name: Run feeds-aggregator
      shell: bash
      run: |
        set -euo pipefail
        args=(
          --sources "${{ inputs.sources }}"
          --output "${{ inputs.output }}"
        )
        if [ -n "${{ inputs.workers }}" ]; then args+=(--workers "${{ inputs.workers }}"); fi
        if [ -n "${{ inputs.timeout }}" ]; then args+=(--timeout "${{ inputs.timeout }}"); fi
        if [ -n "${{ inputs.favicon-delay-ms }}" ]; then args+=(--favicon-delay-ms "${{ inputs.favicon-delay-ms }}"); fi
        if [ -n "${{ inputs.max-items-per-source }}" ]; then args+=(--max-items-per-source "${{ inputs.max-items-per-source }}"); fi
        if [ -n "${{ inputs.max-total-items }}" ]; then args+=(--max-total-items "${{ inputs.max-total-items }}"); fi
        if [ -n "${{ inputs.max-days }}" ]; then args+=(--max-days "${{ inputs.max-days }}"); fi
        if [ -n "${{ inputs.timezone }}" ]; then args+=(--timezone "${{ inputs.timezone }}"); fi
        if [ -n "${{ inputs.favicon-dir }}" ]; then args+=(--favicon-dir "${{ inputs.favicon-dir }}"); fi
        if [ -n "${{ inputs.favicon-public-prefix }}" ]; then args+=(--favicon-public-prefix "${{ inputs.favicon-public-prefix }}"); fi
        if [ -n "${{ inputs.failure-log }}" ]; then args+=(--failure-log "${{ inputs.failure-log }}"); fi
        if [ "${{ inputs.validate-only }}" = "true" ]; then args+=(--validate-only); fi
        feeds-aggregator "${args[@]}"

    - name: Record output path
      id: meta
      shell: bash
      run: echo "output-path=${{ inputs.output }}" >> "$GITHUB_OUTPUT"
